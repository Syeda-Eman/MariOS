<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>MariOS</title>
  <link rel="stylesheet" type="text/css" href="style.css" />
</head>
<body>

  <div class="taskbar" id="top">
    <p id="welcomeopen">MariOS</p>
    <p id="timeElement">6/21/2023 3:41 PM</p>
  </div>

  <div id="desktopApps">
    <div class="app-icon" id="journalIcon">
      <img src="journal.jpg" alt="Journal Icon" />
      <p>My Journal</p>
    </div>

    <div class="app-icon" id="mapIcon">
      <img src="castle.png" alt="Map Icon" />
      <p>World Map</p>
    </div>
  </div>

  <div class="window" id="mydiv">
    <div class="windowheader" id="mydivheader">
      <span class="headertext">Welcome!</span>
      <div class="closebutton" id="welcomeclose" title="Close Window"></div>
    </div>
    <div class="windowcontent">
      <img src="mario.jpg" alt="Mario" />
      <h1>~ MariOS ~</h1>
      <p>
        <dfn>MariOS</dfn> is an <abbr title="Operating System">OS</abbr> inspired by Mario<br />
        Hi! <code>It's-a me, Mario!</code>
      </p>
    </div>
  </div>

  <div class="window" id="journalApp" style="display: none;">
    <div class="windowheader" id="journalAppheader">
      <span class="headertext">MariOS Journal</span>
      <div class="closebutton" id="journalclose" title="Close Window"></div>
    </div>
    <div class="app-container">
      <div id="sidebar"></div>
      <div id="notebookContent" class="content-viewer">
        <p>Select a journal log from the panel to read.</p>
      </div>
    </div>
  </div>

  <div class="window" id="mapApp" style="display: none;">
    <div class="windowheader" id="mapAppheader">
      <span class="headertext">Mushroom Kingdom Explorer</span>
      <div class="closebutton" id="mapclose" title="Close Window"></div>
    </div>
    <div class="map-layout">
      <div class="map-grid">
        <button class="map-pin" onclick="showLocation('castle')">Peach's Castle</button>
        <button class="map-pin" onclick="showLocation('lava')">Bowser's Keep</button>
        <button class="map-pin" onclick="showLocation('island')">Yoshi's Island</button>
      </div>
      <div id="locationDetails"
        <h3>World Selector</h3>
        <p>Click a regional map landmark to inspect zone intelligence.</p>
      </div>
    </div>  
  </div>
  <script src="script.js"></script>
</body>
</html>
